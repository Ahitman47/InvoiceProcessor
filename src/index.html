<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Invoice Review</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 0 20px 60px;
    color: #222;
    background: #f7f7f5;
  }
  header {
    border-bottom: 2px solid #2c3e50;
    margin-bottom: 24px;
    padding: 24px 0 12px;
  }
  h1 { font-size: 24px; margin: 0; color: #2c3e50; }
  header p { margin: 6px 0 0; color: #666; font-size: 14px; }

  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin: 0 0 14px;
  }

  button {
    padding: 9px 16px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #2c3e50;
    background: #2c3e50;
    color: #fff;
    border-radius: 4px;
  }
  button.secondary { background: #fff; color: #2c3e50; }
  button:hover { opacity: 0.9; }
  input[type=file] { font-size: 14px; margin-bottom: 12px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }

  .accept { color: #2f7d32; font-size: 22px; font-weight: bold; }
  .reject { color: #c0392b; font-size: 22px; font-weight: bold; }
  .reason {
    background: #fbecec;
    border-left: 3px solid #c0392b;
    padding: 8px 12px;
    margin: 6px 0;
    font-size: 14px;
  }
  pre {
    background: #f4f4f4;
    padding: 12px;
    overflow-x: auto;
    font-size: 13px;
    border-radius: 4px;
    margin: 0;
  }
  h3 { font-size: 15px; margin: 20px 0 8px; }
</style>
</head>
<body>

<header>
  <h1>Invoice Review</h1>
  <p>Upload a PDF or image to process an invoice.</p>
</header>

<div class="card">
  <h2>Upload</h2>
  <input type="file" id="file"><br>
  <button onclick="upload()">Process invoice</button>
</div>

<div class="card">
  <h2>Tools</h2>
  <div class="row">
    <button class="secondary" onclick="evaluateAll()">Run evaluation on all invoices</button>
    <button class="secondary" onclick="emptyStore()">Reset storage</button>
  </div>
</div>

<div id="result"></div>

<script>
async function upload() {
  const fileInput = document.getElementById("file");
  const result = document.getElementById("result");

  if (fileInput.files.length === 0) {
    result.innerHTML = "<div class='card'>Please choose a file first.</div>";
    return;
  }

  result.innerHTML = "<div class='card'>Processing...</div>";

  const body = new FormData();
  body.append("file", fileInput.files[0]);

  const response = await fetch("/process", { method: "POST", body: body });
  const data = await response.json();

  if (!response.ok) {
    result.innerHTML = "<div class='card'>" + data.error + "</div>";
    return;
  }

  show(data);
}

function show(data) {
  let html = `<div class="card">`;
  html += `<p class="${data.decision}">${data.decision.toUpperCase()}</p>`;

  if (data.failures.length > 0) {
    html += "<h3>Reasons</h3>";
    for (const f of data.failures) {
      html += `<div class="reason">${f.rule_id}: ${f.explanation}</div>`;
    }
  }

  html += "<h3>Extracted data</h3>";
  html += "<pre>" + JSON.stringify(data.extracted, null, 2) + "</pre>";
  html += "</div>";

  document.getElementById("result").innerHTML = html;
}

async function evaluateAll() {
  const result = document.getElementById("result");
  result.innerHTML = "<div class='card'>Running evaluation, this can take a moment...</div>";

  const response = await fetch("/evaluate", { method: "POST" });
  const report = await response.text();

  result.innerHTML = "<div class='card'><h2>Evaluation report</h2><pre>" + report + "</pre></div>";
}

async function emptyStore() {
  const response = await fetch("/empty-store", { method: "POST" });
  const data = await response.json();
  document.getElementById("result").innerHTML = "<div class='card'>" + data.status + "</div>";
}
</script>
</body>
</html>
